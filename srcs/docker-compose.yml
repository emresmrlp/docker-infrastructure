services:
  nginx:
    image: nginx
    build: ./requirements/nginx
    ports:
      - "443:443"
    restart: always
  mariadb:
    image: mariadb
    build: ./requirements/mariadb
    ports:
      - "3306:3306"
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE} 
      MYSQL_USER: ${MYSQL_USER}
    secrets:
      - db_password
      - db_root_password

secrets:
  file:
    db_password:
      file: ../secrets/db_password.txt
    db_root_password:
      file: ../secrets/db_root_password.txt